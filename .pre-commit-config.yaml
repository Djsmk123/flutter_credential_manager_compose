repos:
  - repo: local
    hooks:
      - id: dart-format
        name: Format Flutter/Dart sources (make format, 120 cols)
        entry: make format
        language: system
        pass_filenames: false
        types: [dart]
        exclude: ^docSite/
      - id: flutter-analyze
        name: Run flutter analyze for all packages (make analyze)
        entry: make analyze
        language: system
        pass_filenames: false
        files: \.(dart)$
        exclude: ^docSite/
